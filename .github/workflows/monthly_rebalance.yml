name: Quarterly Rebalance

on:
  schedule:
    # Quarterly, aligned to S&P reconstitution (3rd Friday of Mar/Jun/Sep/Dec).
    # Fires on days 22-26 of those months at 14:00 UTC — after reconstitution has
    # propagated. The window guarantees an open-market day; the script's market-open
    # guard skips weekend/holiday firings, the first open day does the trim, and
    # later days are no-ops (sell-only band; the daily job only buys underweight names).
    - cron: '0 14 22-26 3,6,9,12 *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rebalance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: index_fund.db
          key: index-fund-db-${{ github.run_number }}
          restore-keys: |
            index-fund-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly rebalance
        env:
          ALPACA_INDEX_API_KEY: ${{ secrets.ALPACA_INDEX_API_KEY }}
          ALPACA_INDEX_API_SECRET: ${{ secrets.ALPACA_INDEX_API_SECRET }}
          ALPACA_PAPER: ${{ vars.ALPACA_PAPER || 'true' }}
        run: python monthly_rebalance.py

      - name: Save updated database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: index_fund.db
          key: index-fund-db-${{ github.run_number }}
