name: Constituent Scan

on:
  schedule:
    # Every day at 13:00 UTC (09:00 ET), including weekends. Sharia is screened as a
    # monthly calendar sweep gated by the HalalScreener free-tier daily cap: from the 1st
    # it refreshes up to ~99 names/run until the ~1,000-name universe is covered (~10 days),
    # then stays dormant until the next 1st. BDS re-screens once per quarter. The rebuild,
    # force-sells, and CSV commit run every day (a cold-start guard defers the rebuild only
    # on an empty database). Force-sell orders placed while the market is closed queue for
    # the next session.
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: >-
          full = normal scan (Sharia sweep + BDS + rebuild).
          bds_only = BDS screen + status update against cached Sharia grades,
          skipping the live HalalScreener re-checks. Use to apply a BDS
          definition change immediately instead of waiting for a scheduled run.
        type: choice
        default: full
        options:
          - full
          - bds_only

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: index_fund.db
          key: index-fund-db-${{ github.run_number }}
          restore-keys: |
            index-fund-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run constituent scan
        env:
          ALPACA_INDEX_API_KEY: ${{ secrets.ALPACA_INDEX_API_KEY }}
          ALPACA_INDEX_API_SECRET: ${{ secrets.ALPACA_INDEX_API_SECRET }}
          HALALSCREENER_API_KEY: ${{ secrets.HALALSCREENER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BDS_MODEL: ${{ vars.BDS_MODEL || 'claude-opus-4-8' }}
          ALPACA_PAPER: ${{ vars.ALPACA_PAPER || 'true' }}
          SCAN_MODE: ${{ inputs.mode || 'full' }}
        run: python constituent_scan.py

      - name: Commit public artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f index/constituents.csv ] && git add index/constituents.csv || true
          [ -f index/bds_state.json ] && git add index/bds_state.json || true
          [ -f index/bds_blacklist.json ] && git add index/bds_blacklist.json || true
          [ -d index/snapshots ] && git add index/snapshots || true
          [ -f reports/change_log.md ] && git add reports/change_log.md || true
          [ -f reports/event_log.csv ] && git add reports/event_log.csv || true
          [ -f reports/sharia_progress.md ] && git add reports/sharia_progress.md || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Scan update: $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
