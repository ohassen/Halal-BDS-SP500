name: Liquidate All

# Manual, guarded full liquidation. Sells EVERY open position at market and
# cancels open orders, taking the account to cash. Pair with the Initial Buy
# workflow to fully reset and re-seed the portfolio across the index:
#   1. Run this workflow (type LIQUIDATE to confirm)
#   2. Once the sells fill, run "Initial Buy"
# Run while the market is open so the market orders fill promptly.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type LIQUIDATE to confirm selling ALL positions'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  liquidate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: index_fund.db
          key: index-fund-db-${{ github.run_number }}
          restore-keys: |
            index-fund-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run liquidation
        env:
          ALPACA_INDEX_API_KEY: ${{ secrets.ALPACA_INDEX_API_KEY }}
          ALPACA_INDEX_API_SECRET: ${{ secrets.ALPACA_INDEX_API_SECRET }}
          ALPACA_PAPER: ${{ vars.ALPACA_PAPER || 'true' }}
          CONFIRM_LIQUIDATE: ${{ github.event.inputs.confirm }}
        run: python liquidate.py

      - name: Save updated database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: index_fund.db
          key: index-fund-db-${{ github.run_number }}
